services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: task-library-app-t420-04
    # data/ se vytváří až po připojení bind mountu (ten překryje to z Dockerfilu),
    # jinak SQLite nemá kam zapsat tasks.sqlite → PDO spadne na "unable to open database file"
    command: sh -c "mkdir -p data && chown -R www-data:www-data data && php-fpm"
    volumes:
      - ./:/var/www/html
    expose:
      - "9000"
    networks:
      - tasknet

  web:
    image: nginx:1.27-alpine
    container_name: task-library-web-t420-04
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - tasknet

networks:
  tasknet:
    driver: bridge
